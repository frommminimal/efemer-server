<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эфемер</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f0f1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1e1e2f;
            border-radius: 32px;
            padding: 20px;
        }
        .history {
            background: #0f0f1a;
            border-radius: 24px;
            padding: 16px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 16px;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 85%;
        }
        .user {
            background: #4f46e5;
            margin-left: auto;
            text-align: right;
        }
        .assistant {
            background: #2a2a3c;
            text-align: left;
        }
        .label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #2a2a3c;
            color: white;
            font-size: 1rem;
        }
        button {
            background: #4f46e5;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
        }
        .status {
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🧬 Эфемер</h2>
    <div class="history" id="history">
        <div class="assistant message">💬 Здесь появится история разговора...</div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Спроси меня о чём угодно..." autofocus>
        <button id="sendBtn">Отправить</button>
    </div>
    <div class="status" id="status">⚡ Готов</div>
</div>

<script>
    const API_URL = window.location.origin + '/api/chat';
    const USERNAME = 'Ro';

    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const historyDiv = document.getElementById('history');
    const statusDiv = document.getElementById('status');

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
        const label = document.createElement('div');
        label.className = 'label';
        label.innerText = isUser ? 'Вы' : 'Эфемер';
        const textDiv = document.createElement('div');
        textDiv.innerText = text;
        msgDiv.appendChild(label);
        msgDiv.appendChild(textDiv);
        historyDiv.appendChild(msgDiv);
        historyDiv.scrollTop = historyDiv.scrollHeight;
    }

    function setStatus(text, isError = false) {
        statusDiv.innerHTML = text;
        statusDiv.style.color = isError ? '#ff8888' : '#b9b9e6';
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        messageInput.value = '';
        addMessage(message, true);
        setStatus('🧠 Эфемер думает...');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: USERNAME, message: message })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            addMessage(data.response, false);
            setStatus('⚡ Готов');
        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message}`, true);
            addMessage('Извини, сейчас не могу ответить. Попробуй позже.', false);
        }
    }

    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };
</script>
</body>
</html>
